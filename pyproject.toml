[project]
name = "machine-learning"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "gymnasium[all]",
    "ipykernel",
    "torch",
    "torchvision",
]

[[tool.uv.index]]
name = "pytorch-cu132"
url = "https://download.pytorch.org/whl/cu132"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu132", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
    { index = "pytorch-cu132", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
